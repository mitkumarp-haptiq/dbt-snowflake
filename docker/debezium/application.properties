# Debezium Server: Postgres WAL -> Redpanda (Kafka API).
# Topic: <topic.prefix>.<schema>.<table>, e.g. `app.public.users`.
# Prefect flow is event-triggered by cdc-trigger service when topic offsets advance.

# == Sink (Kafka / Redpanda) ==
debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=redpanda:29092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.acks=all
debezium.sink.kafka.producer.compression.type=lz4

# == Source (PostgreSQL) ==
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=${POSTGRES_HOST_CDC}
debezium.source.database.port=${POSTGRES_PORT}
debezium.source.database.user=${POSTGRES_USER}
debezium.source.database.password=${POSTGRES_PASSWORD}
debezium.source.database.dbname=${POSTGRES_DB}
debezium.source.plugin.name=pgoutput
debezium.source.publication.name=dbz_cdc_pub
debezium.source.publication.autocreate.mode=filtered
debezium.source.topic.prefix=app
# Keep CDC scope explicit; override via env if needed.
debezium.source.table.include.list=${CDC_SOURCE_TABLE_INCLUDE}

# Flatten the Debezium envelope so each Kafka message is just the row data
# plus a __op marker (c/u/d). Tombstones disabled -- deletes carry the row
# state in `before` plus __op=d.
debezium.source.transforms=unwrap
debezium.source.transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
debezium.source.transforms.unwrap.drop.tombstones=true
debezium.source.transforms.unwrap.delete.handling.mode=rewrite
debezium.source.transforms.unwrap.add.fields=op,ts_ms

# == Format ==
debezium.format.value=json
debezium.format.value.schemas.enable=false
debezium.format.key=json
debezium.format.key.schemas.enable=false

# == Offset and schema history (file-based, persisted via docker volume) ==
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=5000
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat
